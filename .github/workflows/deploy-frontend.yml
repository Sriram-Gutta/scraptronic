# Publish the /frontend folder (plus the /data folder for fallback fetches)
# to GitHub Pages whenever either changes.

name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'data/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# only one deploy at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage frontend + data
        run: |
          mkdir -p _site
          cp -r frontend/* _site/
          if [ -d data ]; then
            mkdir -p _site/data
            # only publish the actual JSON files, not the build script
            find data -maxdepth 1 -name '*.json' -exec cp {} _site/data/ \;
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload _site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
